<div class="app-dashboard-wrapper">
  
  <!-- Sidebar Navigation (OWW / Saleva Style) -->
  <aside class="app-sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">S</div>
      <span class="brand-name">Saleva Travel</span>
    </div>
    
    <nav class="sidebar-nav">
      <button 
        class="nav-link" 
        [class.active]="currentView === 'form'" 
        (click)="currentView = 'form'">
        <span class="nav-icon">📋</span>
        <span class="nav-text">Plan Trip</span>
      </button>
      
      <button 
        class="nav-link" 
        [disabled]="!itinerary"
        [class.active]="currentView === 'itinerary'" 
        (click)="currentView = 'itinerary'">
        <span class="nav-icon">🧭</span>
        <span class="nav-text">Itinerary</span>
      </button>
      
      <button 
        class="nav-link" 
        [disabled]="chatMessages.length === 0"
        [class.active]="currentView === 'chat'" 
        (click)="currentView = 'chat'">
        <span class="nav-icon">💬</span>
        <span class="nav-text">Travel Chat</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <span class="user-name">Traveler</span>
          <span class="user-role">Explorer Profile</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Viewport Area -->
  <div class="app-main-viewport">
    
    <!-- Topbar (OWW / Saleva Style) -->
    <header class="app-topbar">
      <div class="topbar-title">
        <h2>{{ title }}</h2>
        <p class="topbar-subtitle">Create optimized itineraries powered by local travel guides</p>
      </div>
      <div class="topbar-status">
        <span class="status-indicator"></span>
        <span class="status-text">RAG Service Active</span>
      </div>
    </header>

    <!-- Content Workspace -->
    <main class="app-workspace scrollable-content">
      
      <!-- Error Message -->
      <div class="error-banner" *ngIf="error">
        <span class="error-icon">⚠️</span>
        <p class="error-text">{{ error }}</p>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" *ngIf="isLoading">
        <div class="spinner"></div>
        <p>Creating your optimized itinerary...</p>
      </div>

      <!-- View 1: Form (Plan Trip) -->
      <div *ngIf="currentView === 'form'" class="view-wrapper animate-fade">
        <div class="dashboard-form-grid">
          <app-rag-itinerary></app-rag-itinerary>
          <app-trip-form (formSubmit)="onFormSubmit($event)"></app-trip-form>
        </div>
      </div>

      <!-- View 2: Itinerary Details -->
      <div *ngIf="currentView === 'itinerary'" class="view-wrapper animate-fade">
        <div class="view-actions-bar">
          <button (click)="startNewItinerary()" class="btn-dashboard-action secondary">
            🔄 Start New Itinerary
          </button>
          <button (click)="toggleChatView()" class="btn-dashboard-action primary">
            💬 Adjust with Advisor
          </button>
        </div>
        <app-itinerary-display 
          [itinerary]="itinerary"
          [tripPreferences]="tripPreferences"
          (exportRequest)="onExportItinerary($event)">
        </app-itinerary-display>
      </div>

      <!-- View 3: Advisor Chat -->
      <div *ngIf="currentView === 'chat'" class="view-wrapper animate-fade">
        <div class="view-actions-bar">
          <button (click)="toggleChatView()" class="btn-dashboard-action secondary">
            ← Back to Itinerary
          </button>
        </div>
        <app-chat-interface
          [messages]="chatMessages"
          [tripContext]="tripPreferences"
          [isLoading]="isLoading"
          (sendMessage)="onSendChatMessage($event)">
        </app-chat-interface>
      </div>

    </main>

  </div>
</div>
